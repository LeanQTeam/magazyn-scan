<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A2F5C">
<title>MagazynScan</title>
<style>
:root {
  --bg:#F4F2EE;--surface:#FFF;--ink:#1A1A1A;--ink2:#666;
  --accent:#1A2F5C;--accent2:#E8B020;--border:#DDDAD3;
  --in:#1A2F5C;--out:#8B2F1A;
  --r:12px;--sh:0 2px 12px rgba(0,0,0,0.08);
  --f:'Trebuchet MS','Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
header{background:var(--accent);color:#fff;padding:12px 16px 10px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
header h1{font-size:17px;font-weight:700;letter-spacing:0.5px}
.hv{font-size:10px;opacity:0.55;margin-left:4px;font-weight:400}
.hsub{font-size:10px;opacity:0.6;margin-top:1px}
nav{display:grid;grid-template-columns:repeat(5,1fr);background:var(--surface);border-bottom:2px solid var(--border)}
nav button{padding:8px 1px 6px;border:none;background:none;font-family:var(--f);font-size:9px;font-weight:600;color:var(--ink2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;letter-spacing:0.2px}
nav button svg{width:18px;height:18px}
nav button.active{color:var(--accent);border-bottom:2px solid var(--accent);margin-bottom:-2px}
.screen{display:none;flex:1;flex-direction:column;padding:14px;gap:12px;overflow-y:auto;padding-bottom:40px}
.screen.active{display:flex}
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden}
.ch{padding:11px 14px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--ink2);display:flex;align-items:center;gap:5px}
.cb{padding:14px;display:flex;flex-direction:column;gap:10px}
.worker-screen{position:fixed;inset:0;background:var(--accent);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px}
.worker-screen h2{color:#fff;font-size:22px;font-weight:700}
.worker-screen p{color:rgba(255,255,255,0.7);font-size:13px;text-align:center}
.worker-list{width:100%;display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto}
.worker-btn{width:100%;padding:14px 18px;background:rgba(255,255,255,0.12);color:#fff;border:2px solid rgba(255,255,255,0.25);border-radius:var(--r);font-family:var(--f);font-size:15px;font-weight:600;cursor:pointer;text-align:left;transition:all 0.15s}
.worker-btn:active{background:rgba(255,255,255,0.25)}
.wh-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.chip{padding:5px 13px;border-radius:20px;border:2px solid var(--border);font-size:12px;font-weight:600;font-family:var(--f);background:var(--bg);cursor:pointer;color:var(--ink);transition:all 0.15s}
.chip.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.add{border-style:dashed;color:var(--ink2);font-size:19px;padding:1px 11px}
.op-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.op-btn{padding:11px;border-radius:var(--r);border:2px solid transparent;font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all 0.15s}
.op-btn.win{background:#EEF2FA;color:var(--in);border-color:#C5D0E8}
.op-btn.win.sel{background:var(--in);color:#fff;border-color:var(--in)}
.op-btn.wout{background:#FAF0EE;color:var(--out);border-color:#E8C5C0}
.op-btn.wout.sel{background:var(--out);color:#fff;border-color:var(--out)}
.worker-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface);border-radius:var(--r);box-shadow:var(--sh);font-size:12px}
.worker-bar strong{color:var(--accent);font-weight:700}
.worker-bar button{font-size:11px;color:var(--ink2);border:1px solid var(--border);background:var(--bg);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:var(--f)}
.cam-wrap{position:relative;background:#000;border-radius:var(--r);overflow:hidden;aspect-ratio:4/3;display:none}
#video{width:100%;height:100%;object-fit:cover;display:block}
.scan-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-fr{width:65%;aspect-ratio:2/1;border:2px solid var(--accent2);border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);position:relative;overflow:hidden}
.scan-ln{position:absolute;left:4px;right:4px;height:2px;background:var(--accent2);animation:scl 2s linear infinite;top:4px}
@keyframes scl{0%{top:4px;opacity:1}90%{top:calc(100% - 6px);opacity:1}100%{top:calc(100% - 6px);opacity:0}}
.cam-hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.75);font-size:11px;font-weight:600}
.btn-main{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:var(--f);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-main:active{opacity:0.85}
.btn-stop{width:100%;padding:9px;background:var(--border);color:var(--ink2);border:none;border-radius:var(--r);font-family:var(--f);font-size:12px;font-weight:600;cursor:pointer;display:none}
.group-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.group-btn{padding:12px 10px;background:var(--surface);border:2px solid var(--border);border-radius:var(--r);font-family:var(--f);font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;text-align:left;line-height:1.3;transition:all 0.15s}
.group-btn:active,.group-btn.sel{background:var(--accent);color:#fff;border-color:var(--accent)}
.prod-search{width:100%;padding:9px 12px;border:2px solid var(--border);border-radius:var(--r);font-family:var(--f);font-size:13px;background:var(--bg);color:var(--ink);outline:none;transition:border-color 0.15s}
.prod-search:focus{border-color:var(--accent)}
.prod-list{display:flex;flex-direction:column;gap:4px;max-height:280px;overflow-y:auto}
.prod-item{padding:10px 12px;background:var(--surface);border-radius:8px;border:1.5px solid var(--border);cursor:pointer;transition:all 0.15s}
.prod-item:active{border-color:var(--accent);background:#EEF2FA}
.prod-name{font-size:13px;font-weight:600;color:var(--ink)}
.prod-meta{font-size:10px;color:var(--ink2);margin-top:2px}
.back-btn{padding:7px 14px;background:none;border:2px solid var(--border);border-radius:20px;font-family:var(--f);font-size:12px;font-weight:600;color:var(--ink2);cursor:pointer}
.input-row{display:flex;gap:7px}
.ti{flex:1;padding:9px 11px;border:2px solid var(--border);border-radius:var(--r);font-family:var(--f);font-size:13px;background:var(--bg);color:var(--ink);outline:none;transition:border-color 0.15s}
.ti:focus{border-color:var(--accent)}
.icon-btn{padding:9px 13px;border:2px solid var(--border);border-radius:var(--r);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--f);font-size:12px;font-weight:700;color:var(--accent)}
.result-flash{border-radius:var(--r);padding:13px 15px;display:flex;flex-direction:column;gap:4px;border-left:4px solid var(--accent);animation:fi 0.3s ease}
.result-flash.win{border-left-color:var(--in);background:#EEF2FA}
.result-flash.wout{border-left-color:var(--out);background:#FAF0EE}
@keyframes fi{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
.rc{font-size:10px;color:var(--ink2);font-weight:600;letter-spacing:0.5px}
.rn{font-size:16px;font-weight:700}
.rm{font-size:11px;color:var(--ink2)}
.rb{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.5px;margin-top:2px;width:fit-content}
.rb.win{background:var(--in);color:#fff}
.rb.wout{background:var(--out);color:#fff}
.sync-row{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#ccc}
.sdot.ok{background:#2D6A3F;animation:pu 1.8s ease infinite}
.sdot.warn{background:var(--accent2)}
.sdot.off{background:#ccc}
@keyframes pu{0%,100%{opacity:1}50%{opacity:0.35}}
.modal-bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center}
.modal-bd.open{display:flex}
.modal{background:var(--surface);border-radius:20px 20px 0 0;padding:22px 18px 34px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:13px;animation:su 0.25s ease;max-height:90vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:15px;font-weight:700}
.mlabel{font-size:10px;font-weight:700;color:var(--ink2);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:3px}
.mcode{font-size:12px;padding:7px 11px;background:var(--bg);border-radius:7px;font-weight:600;color:var(--ink2);letter-spacing:0.5px;border:1px solid var(--border)}
.btn-p{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:var(--f);font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s}
.btn-s{width:100%;padding:11px;background:none;color:var(--ink2);border:2px solid var(--border);border-radius:var(--r);font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer}
.qty-row{display:flex;align-items:center;gap:11px}
.qty-row label{font-size:10px;font-weight:700;color:var(--ink2);letter-spacing:0.5px;text-transform:uppercase;flex:0 0 auto}
.qi{width:80px;padding:7px 9px;border:2px solid var(--border);border-radius:var(--r);font-family:var(--f);font-size:15px;font-weight:700;text-align:center;background:var(--bg);color:var(--ink);outline:none}
.qi:focus{border-color:var(--accent)}
.fr{display:flex;gap:5px;flex-wrap:wrap}
.fc{padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);font-size:11px;font-weight:600;font-family:var(--f);background:var(--bg);cursor:pointer;color:var(--ink2);transition:all 0.15s}
.fc.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.fc.fi.active{background:var(--in);border-color:var(--in)}
.fc.fo.active{background:var(--out);border-color:var(--out)}
.hi-list{display:flex;flex-direction:column;gap:5px}
.hi{background:var(--surface);border-radius:var(--r);padding:9px 12px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh);border-left:3px solid var(--border)}
.hi.win{border-left-color:var(--in)}
.hi.wout{border-left-color:var(--out)}
.hii{width:30px;height:30px;flex-shrink:0;border-radius:7px;display:flex;align-items:center;justify-content:center}
.hii.win{background:#EEF2FA}
.hii.wout{background:#FAF0EE}
.hif{flex:1;min-width:0}
.hin{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hic{font-size:10px;color:var(--ink2);margin-top:1px}
.him{text-align:right;flex-shrink:0}
.hit{font-size:10px;font-weight:700;color:var(--ink2)}
.hiw{font-size:9px;color:var(--ink2);margin-top:1px}
.stock-list{display:flex;flex-direction:column;gap:5px}
.stock-item{background:var(--surface);border-radius:var(--r);padding:10px 13px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
.si-info{flex:1;min-width:0}
.si-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-group{font-size:10px;color:var(--ink2);margin-top:1px}
.si-qty{font-size:18px;font-weight:800;flex-shrink:0;min-width:48px;text-align:right}
.si-qty.pos{color:var(--in)}
.si-qty.neg{color:var(--out)}
.si-qty.zero{color:var(--ink2)}
.si-unit{font-size:10px;color:var(--ink2);text-align:right;flex-shrink:0;margin-left:3px}
.slabel{font-size:10px;font-weight:700;color:var(--ink2);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:3px}
.shint{font-size:11px;color:var(--ink2);line-height:1.6}
.btn-a{width:100%;padding:12px;border:none;border-radius:var(--r);font-family:var(--f);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-a.pr{background:var(--accent);color:#fff}
.btn-a.am{background:var(--accent2);color:#1A1A1A}
.btn-a.ou{background:none;color:var(--accent);border:2px solid var(--accent)}
.btn-a.da{background:none;color:var(--out);border:2px solid var(--out)}
.divider{border:none;border-top:1px solid var(--border)}
.empty{text-align:center;padding:36px 18px;color:var(--ink2);font-size:13px;line-height:2}
.empty svg{width:40px;height:40px;opacity:0.2;display:block;margin:0 auto 8px}
#toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A1A1A;color:#fff;padding:9px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:300;transition:transform 0.28s ease,opacity 0.28s ease;opacity:0;white-space:nowrap;pointer-events:none;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="worker-screen" id="workerScreen">
  <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
    <rect x="2" y="9" width="4" height="17" fill="white" opacity="0.9"/>
    <rect x="8" y="5" width="2" height="21" fill="white" opacity="0.9"/>
    <rect x="12" y="9" width="3" height="17" fill="white" opacity="0.9"/>
    <rect x="17" y="5" width="2" height="21" fill="white" opacity="0.9"/>
    <rect x="21" y="9" width="4" height="17" fill="white" opacity="0.9"/>
    <rect x="27" y="5" width="3" height="21" fill="white" opacity="0.9"/>
  </svg>
  <h2>MagazynScan</h2>
  <p>Wybierz pracownika aby rozpocząć</p>
  <div class="worker-list" id="workerList"></div>
</div>

<header>
  <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
    <rect x="2" y="9" width="4" height="17" fill="white" opacity="0.9"/>
    <rect x="8" y="5" width="2" height="21" fill="white" opacity="0.9"/>
    <rect x="12" y="9" width="3" height="17" fill="white" opacity="0.9"/>
    <rect x="17" y="5" width="2" height="21" fill="white" opacity="0.9"/>
    <rect x="21" y="9" width="4" height="17" fill="white" opacity="0.9"/>
    <rect x="27" y="5" width="3" height="21" fill="white" opacity="0.9"/>
  </svg>
  <div>
    <h1>MagazynScan <span class="hv">v2.0</span></h1>
    <div class="hsub" id="headerSub">Wybierz magazyn</div>
  </div>
</header>

<nav>
  <button class="active" onclick="showScreen('scan')" id="tab-scan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
    SKANUJ
  </button>
  <button onclick="showScreen('history')" id="tab-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
    HISTORIA
  </button>
  <button onclick="showScreen('stock')" id="tab-stock">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="6" height="18" rx="1"/><rect x="9" y="8" width="6" height="13" rx="1"/><rect x="16" y="13" width="6" height="8" rx="1"/></svg>
    MAGAZYN
  </button>
  <button onclick="showScreen('products')" id="tab-products">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    PRODUKTY
  </button>
  <button onclick="showScreen('settings')" id="tab-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    USTAW.
  </button>
</nav>

<!-- SKANUJ -->
<div class="screen active" id="screen-scan">
  <div class="worker-bar" id="workerBar">
    <span>Pracownik: <strong id="workerBarName">—</strong></span>
    <button onclick="logoutWorker()">Zmień</button>
  </div>
  <div class="card">
    <div class="ch"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> MAGAZYN</div>
    <div class="cb"><div class="wh-row" id="whChips"></div></div>
  </div>
  <div class="card">
    <div class="ch"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg> OPERACJA</div>
    <div class="cb">
      <div class="op-toggle">
        <button class="op-btn win sel" id="btnW" onclick="setOp('wejscie')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg> WEJŚCIE
        </button>
        <button class="op-btn wout" id="btnO" onclick="setOp('wyjscie')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> WYJŚCIE
        </button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="ch"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg> KAMERA / KOD RĘCZNIE</div>
    <div class="cb">
      <div class="cam-wrap" id="camWrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-ov"><div class="scan-fr"><div class="scan-ln"></div></div></div>
        <div class="cam-hint">Skieruj na kod kreskowy</div>
      </div>
      <button class="btn-main" id="camStartBtn" onclick="startCamera()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Uruchom kamerę
      </button>
      <button class="btn-stop" id="camStopBtn" onclick="stopCamera()">Zatrzymaj kamerę</button>
      <div class="input-row">
        <input class="ti" id="manualInput" placeholder="Wpisz kod kreskowy..." type="text" inputmode="numeric" onkeydown="if(event.key==='Enter')handleManual()">
        <button class="icon-btn" onclick="handleManual()">OK</button>

<script>
// ═══ STATE ═══
let db = loadDB();
let currentOp = 'wejscie';
let currentWh = db.warehouses[0] || null;
let currentWorker = null;
let filterWh = 'all', filterOp = 'all', stockWh = 'all';
let selectedGroup = null;
let pendingProduct = null;
let cameraActive = false, scanLoop = null, detector = null;

function loadDB() {
  try { const r = localStorage.getItem('mscan_v4'); if (r) return JSON.parse(r); } catch(e) {}
  return { warehouses: ['Magazyn A'], workers: ['Pracownik 1'], products: {}, history: [] };
}
function saveDB() { localStorage.setItem('mscan_v4', JSON.stringify(db)); updateLocalInfo(); }

// ═══ LOGIN ═══
function initWorkerScreen() {
  const list = document.getElementById('workerList');
  list.innerHTML = '';
  db.workers.forEach(function(w) {
    const b = document.createElement('button');
    b.className = 'worker-btn';
    b.textContent = w;
    b.onclick = function() { selectWorker(w); };
    list.appendChild(b);
  });
}
function selectWorker(w) {
  currentWorker = w;
  document.getElementById('workerScreen').style.display = 'none';
  document.getElementById('workerBarName').textContent = w;
}
function logoutWorker() {
  currentWorker = null;
  document.getElementById('workerScreen').style.display = 'flex';
  initWorkerScreen();
}
function addWorker() {
  const v = document.getElementById('newWorkerInput').value.trim();
  if (!v || db.workers.includes(v)) return;
  db.workers.push(v); saveDB();
  document.getElementById('newWorkerInput').value = '';
  renderWorkerChips(); initWorkerScreen();
  showToast('Dodano: ' + v);
}
function removeWorker(w) {
  if (!confirm('Usunąć pracownika "' + w + '"?')) return;
  db.workers = db.workers.filter(function(x) { return x !== w; });
  saveDB(); renderWorkerChips(); initWorkerScreen();
}
function renderWorkerChips() {
  const c = document.getElementById('workerChips'); if (!c) return;
  c.innerHTML = '';
  db.workers.forEach(function(w) {
    const span = document.createElement('span');
    span.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:2px solid var(--border);font-size:12px;font-weight:600;background:var(--bg)';
    span.appendChild(document.createTextNode(w));
    const x = document.createElement('button');
    x.textContent = 'x';
    x.style.cssText = 'border:none;background:none;color:var(--out);font-size:14px;cursor:pointer;padding:0;line-height:1;margin-left:2px';
    x.onclick = function() { removeWorker(w); };
    span.appendChild(x);
    c.appendChild(span);
  });
}

// ═══ SCREENS ═══
function showScreen(n) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('screen-' + n).classList.add('active');
  document.getElementById('tab-' + n).classList.add('active');
  if (n !== 'scan') stopCamera();
  if (n === 'history') { renderWhFilterChips(); renderHistory(); }
  if (n === 'stock') { renderStockWhChips(); renderStock(); }
  if (n === 'products') renderProductsTab();
  if (n === 'settings') renderSettings();
}

// ═══ WAREHOUSES ═══
function renderWhChips() {
  // scan screen — chips only (select)
  var scanC = document.getElementById('whChips');
  if (scanC) {
    scanC.innerHTML = '';
    db.warehouses.forEach(function(wh) {
      const b = document.createElement('button');
      b.className = 'chip' + (wh === currentWh ? ' sel' : '');
      b.textContent = wh;
      b.onclick = function() { currentWh = wh; renderWhChips(); updateHeaderSub(); };
      scanC.appendChild(b);
    });
    const add = document.createElement('button');
    add.className = 'chip add'; add.textContent = '+';
    add.onclick = function() { document.getElementById('newWhName').value = ''; document.getElementById('addWhModal').classList.add('open'); };
    scanC.appendChild(add);
  }
  // settings screen — chips with delete x (like workers)
  var settC = document.getElementById('whChipsSettings');
  if (settC) {
    settC.innerHTML = '';
    db.warehouses.forEach(function(wh) {
      const span = document.createElement('span');
      span.style.cssText = 'display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:2px solid var(--border);font-size:12px;font-weight:600;background:var(--bg)';
      span.appendChild(document.createTextNode(wh));
      const x = document.createElement('button');
      x.textContent = 'x';
      x.style.cssText = 'border:none;background:none;color:var(--out);font-size:14px;cursor:pointer;padding:0;line-height:1;margin-left:2px';
      x.onclick = function() { removeWarehouse(wh); };
      span.appendChild(x);
      settC.appendChild(span);
    });
    const add = document.createElement('button');
    add.className = 'chip add'; add.textContent = '+';
    add.onclick = function() { document.getElementById('newWhName').value = ''; document.getElementById('addWhModal').classList.add('open'); };
    settC.appendChild(add);
  }
}
function renderWhFilterChips() {
  const fc = document.getElementById('whFilterChips'); if (!fc) return; fc.innerHTML = '';
  var opts = [['all','Wszystkie']].concat(db.warehouses.map(function(w) { return [w,w]; }));
  opts.forEach(function(pair) {
    const b = document.createElement('button');
    b.className = 'fc' + (filterWh === pair[0] ? ' active' : '');
    b.textContent = pair[1];
    b.onclick = function() { filterWh = pair[0]; renderWhFilterChips(); renderHistory(); };
    fc.appendChild(b);
  });
}
function renderStockWhChips() {
  const fc = document.getElementById('stockWhChips'); if (!fc) return; fc.innerHTML = '';
  var opts = [['all','Wszystkie']].concat(db.warehouses.map(function(w) { return [w,w]; }));
  opts.forEach(function(pair) {
    const b = document.createElement('button');
    b.className = 'fc' + (stockWh === pair[0] ? ' active' : '');
    b.textContent = pair[1];
    b.onclick = function() { stockWh = pair[0]; renderStockWhChips(); renderStock(); };
    fc.appendChild(b);
  });
}
function addWarehouse() {
  const v = document.getElementById('newWhName').value.trim(); if (!v) return;
  if (!db.warehouses.includes(v)) { db.warehouses.push(v); saveDB(); }
  currentWh = v; closeWhModal(); renderWhChips(); updateHeaderSub(); showToast('Dodano: ' + v);
}
function removeWarehouse(wh) {
  if (!confirm('Usunąć magazyn "' + wh + '"?')) return;
  db.warehouses = db.warehouses.filter(function(x) { return x !== wh; });
  if (currentWh === wh) currentWh = db.warehouses[0] || null;
  saveDB(); renderWhChips(); updateHeaderSub();
}
function closeWhModal() { document.getElementById('addWhModal').classList.remove('open'); }
function updateHeaderSub() { document.getElementById('headerSub').textContent = currentWh || 'Wybierz magazyn'; }

// ═══ OPERATION ═══
function setOp(op) {
  currentOp = op;
  document.getElementById('btnW').classList.toggle('sel', op === 'wejscie');
  document.getElementById('btnO').classList.toggle('sel', op === 'wyjscie');
}
function setOpF(op) {
  filterOp = op;
  document.getElementById('fAll').classList.toggle('active', op === 'all');
  document.getElementById('fWej').classList.toggle('active', op === 'wejscie');
  document.getElementById('fWyj').classList.toggle('active', op === 'wyjscie');
  renderHistory();
}

// ═══ PRODUCT PICKER ═══
function renderGroupGrid() {
  const grid = document.getElementById('groupGrid');
  grid.innerHTML = '';
  grid.style.display = 'grid';
  document.getElementById('prodList').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  CATALOG.groups.forEach(function(g) {
    const b = document.createElement('button');
    b.className = 'group-btn';
    b.textContent = g.name;
    b.onclick = function() { selectGroup(g.id); };
    grid.appendChild(b);
  });
}
function selectGroup(gid) {
  selectedGroup = gid;
  const prods = CATALOG.products.filter(function(p) { return p.groupId === gid; });
  showProdList(prods);
}
function showGroups() {
  selectedGroup = null;
  document.getElementById('prodSearch').value = '';
  renderGroupGrid();
}
function filterProducts() {
  const q = document.getElementById('prodSearch').value.toLowerCase().trim();
  if (!q) { showGroups(); return; }
  const prods = CATALOG.products.filter(function(p) {
    return p.name.toLowerCase().indexOf(q) >= 0 || p.group.toLowerCase().indexOf(q) >= 0;
  });
  showProdList(prods);
}
function showProdList(prods) {
  document.getElementById('groupGrid').style.display = 'none';
  document.getElementById('backBtn').style.display = 'inline-block';
  const list = document.getElementById('prodList');
  list.style.display = 'flex';
  if (!prods.length) { list.innerHTML = '<div class="empty">Brak produktów</div>'; return; }
  list.innerHTML = prods.map(function(p) {
    return '<div class="prod-item" onclick="selectProduct(\'' + p.id + '\')">' +
      '<div class="prod-name">' + escHtml(p.name) + '</div>' +
      '<div class="prod-meta">' + escHtml(p.group) + ' &middot; ' + p.weight + ' ' + p.unit + (p.barcode ? ' &middot; ' + p.barcode : '') + '</div>' +
      '</div>';
  }).join('');
}
function selectProduct(pid) {
  const p = CATALOG.products.find(function(x) { return x.id === pid; });
  if (!p) return;
  if (!currentWh) { showToast('Najpierw wybierz magazyn!'); return; }
  if (!currentWorker) { showToast('Najpierw wybierz pracownika!'); logoutWorker(); return; }
  openConfirmModal(p);
}

// ═══ CAMERA ═══
async function getDetector() {
  if (detector) return detector;
  if (!('BarcodeDetector' in window)) return null;
  try {
    const formats = await BarcodeDetector.getSupportedFormats();
    detector = new BarcodeDetector({ formats: formats });
    return detector;
  } catch(e) { return null; }
}
async function startCamera() {
  if (cameraActive) return;
  if (!currentWh) { showToast('Najpierw wybierz magazyn!'); return; }
  if (!currentWorker) { showToast('Najpierw zaloguj się!'); logoutWorker(); return; }
  const det = await getDetector();
  if (!det) { showToast('Kamera niedostępna — użyj listy produktów'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    document.getElementById('camWrap').style.display = 'block';
    document.getElementById('camStartBtn').style.display = 'none';
    document.getElementById('camStopBtn').style.display = 'block';
    cameraActive = true;
    scanLoop = setInterval(async function() {
      if (!cameraActive) return;
      try {
        const results = await det.detect(video);
        if (results && results.length > 0 && results[0].rawValue) {
          if (navigator.vibrate) navigator.vibrate(80);
          stopCamera();
          handleBarcode(results[0].rawValue);
        }
      } catch(e) {}
    }, 300);
  } catch(e) {
    cameraActive = false;
    document.getElementById('camWrap').style.display = 'none';
    document.getElementById('camStartBtn').style.display = 'flex';
    document.getElementById('camStopBtn').style.display = 'none';
    if (e.name === 'NotAllowedError') showToast('Brak zgody na kamerę — zezwól w ustawieniach Chrome');
    else showToast('Błąd: ' + (e.message || e.name));
  }
}
function stopCamera() {
  cameraActive = false;
  if (scanLoop) { clearInterval(scanLoop); scanLoop = null; }
  const v = document.getElementById('video');
  if (v.srcObject) { v.srcObject.getTracks().forEach(function(t) { t.stop(); }); v.srcObject = null; }
  document.getElementById('camWrap').style.display = 'none';
  document.getElementById('camStartBtn').style.display = 'flex';
  document.getElementById('camStopBtn').style.display = 'none';
}
function handleManual() {
  const v = document.getElementById('manualInput').value.trim(); if (!v) return;
  document.getElementById('manualInput').value = '';
  handleBarcode(v);
}
function handleBarcode(code) {
  if (!currentWh) { showToast('Najpierw wybierz magazyn!'); return; }
  if (!currentWorker) { showToast('Najpierw zaloguj się!'); logoutWorker(); return; }
  const p = CATALOG.products.find(function(x) { return x.barcode === code; });
  if (p) {
    openConfirmModal(p);
  } else {
    openConfirmModal({ id: 'bc_' + code, name: code, group: 'Kod kreskowy', unit: 'szt', weight: 1, barcode: code });
  }
}

// ═══ CONFIRM MODAL ═══
function openConfirmModal(p) {
  pendingProduct = p;
  document.getElementById('cmTitle').textContent = currentOp === 'wejscie' ? 'Potwierdź WEJŚCIE' : 'Potwierdź WYJŚCIE';
  document.getElementById('cmProduct').textContent = p.name;
  document.getElementById('cmGroup').textContent = p.group;
  document.getElementById('cmWh').textContent = currentWh;
  document.getElementById('cmWorker').textContent = currentWorker;
  document.getElementById('cmQty').value = 1;
  document.getElementById('cmUnit').textContent = p.unit || 'szt';
  document.getElementById('cmConfirmBtn').style.background = currentOp === 'wejscie' ? 'var(--in)' : 'var(--out)';
  document.getElementById('confirmModal').classList.add('open');
  setTimeout(function() { document.getElementById('cmQty').focus(); }, 300);
}
function confirmOp() {
  const qty = parseInt(document.getElementById('cmQty').value) || 1;
  addHistory(pendingProduct, qty);
  closeConfirm();
}
function closeConfirm() {
  document.getElementById('confirmModal').classList.remove('open');
  pendingProduct = null;
}

// ═══ ADD HISTORY ═══
function addHistory(p, qty) {
  const signedQty = currentOp === 'wejscie' ? qty : -qty;
  const entry = {
    id: Date.now() + '_' + Math.random().toString(36).slice(2),
    productId: p.id, barcode: p.barcode || '',
    name: p.name, group: p.group,
    op: currentOp, wh: currentWh, worker: currentWorker,
    qty: signedQty, unit: p.unit || 'szt',
    ts: Date.now()
  };
  db.history.unshift(entry);
  saveDB();
  showResultFlash(entry);
  var sign = signedQty > 0 ? '+' : '';
  showToast(currentOp === 'wejscie' ? 'Zarejestrowano WEJŚCIE ' + sign + signedQty : 'Zarejestrowano WYJŚCIE ' + signedQty);
}
function showResultFlash(e) {
  const r = document.getElementById('scanResult'); r.style.display = 'block';
  const sign = e.qty > 0 ? '+' : '';
  r.innerHTML = '<div class="result-flash ' + (e.op === 'wejscie' ? 'win' : 'wout') + '">' +
    '<div class="rc">' + escHtml(e.group) + '</div>' +
    '<div class="rn">' + escHtml(e.name) + '</div>' +
    '<div class="rm">' + escHtml(e.wh) + ' &middot; ' + escHtml(e.worker) + ' &middot; ' + sign + e.qty + ' ' + e.unit + ' &middot; ' + fmtTime(e.ts) + '</div>' +
    '<span class="rb ' + (e.op === 'wejscie' ? 'win' : 'wout') + '">' + (e.op === 'wejscie' ? 'WEJŚCIE' : 'WYJŚCIE') + '</span>' +
    '</div>';
}

// ═══ HISTORY ═══
function renderHistory() {
  const list = document.getElementById('histList');
  var items = db.history;
  if (filterWh !== 'all') items = items.filter(function(i) { return i.wh === filterWh; });
  if (filterOp !== 'all') items = items.filter(function(i) { return i.op === filterOp; });
  if (!items.length) { list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/></svg>Brak wpisów</div>'; return; }
  list.innerHTML = items.map(function(i) {
    var sign = i.qty > 0 ? '+' : '';
    var opClass = i.op === 'wejscie' ? 'win' : 'wout';
    var icon = i.op === 'wejscie'
      ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>';
    return '<div class="hi ' + opClass + '">' +
      '<div class="hii ' + opClass + '">' + icon + '</div>' +
      '<div class="hif"><div class="hin">' + escHtml(i.name) + '</div>' +
      '<div class="hic">' + escHtml(i.worker || '') + ' &middot; ' + sign + i.qty + ' ' + (i.unit||'szt') + '</div></div>' +
      '<div class="him"><div class="hit">' + fmtTime(i.ts) + '</div>' +
      '<div class="hiw">' + escHtml(i.wh) + '</div></div>' +
      '</div>';
  }).join('');
}

// ═══ STOCK ═══
function renderStock() {
  var q = (document.getElementById('stockSearch') ? document.getElementById('stockSearch').value : '').toLowerCase();
  var list = document.getElementById('stockList');
  var stockMap = {};
  db.history.forEach(function(i) {
    if (stockWh !== 'all' && i.wh !== stockWh) return;
    var key = i.name + '||' + i.group;
    if (!stockMap[key]) stockMap[key] = { name: i.name, group: i.group || '', unit: i.unit || 'szt', qty: 0 };
    stockMap[key].qty += i.qty;
  });
  var entries = Object.values(stockMap);
  if (q) entries = entries.filter(function(e) { return e.name.toLowerCase().indexOf(q) >= 0 || e.group.toLowerCase().indexOf(q) >= 0; });
  entries.sort(function(a,b) { return a.group.localeCompare(b.group) || a.name.localeCompare(b.name); });
  if (!entries.length) { list.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="6" height="18" rx="1"/><rect x="9" y="8" width="6" height="13" rx="1"/></svg>Brak danych magazynowych</div>'; return; }
  list.innerHTML = entries.map(function(e) {
    var qClass = e.qty > 0 ? 'pos' : e.qty < 0 ? 'neg' : 'zero';
    var sign = e.qty > 0 ? '+' : '';
    return '<div class="stock-item">' +
      '<div class="si-info"><div class="si-name">' + escHtml(e.name) + '</div><div class="si-group">' + escHtml(e.group) + '</div></div>' +
      '<div class="si-qty ' + qClass + '">' + sign + e.qty + '</div>' +
      '<div class="si-unit">' + escHtml(e.unit) + '</div>' +
      '</div>';
  }).join('');
}

// ═══ PRODUCTS TAB ═══
function renderProductsTab() {
  var q = (document.getElementById('productSearch') ? document.getElementById('productSearch').value : '').toLowerCase();
  var list = document.getElementById('productList');
  var prods = CATALOG.products;
  if (q) prods = prods.filter(function(p) { return p.name.toLowerCase().indexOf(q) >= 0 || p.group.toLowerCase().indexOf(q) >= 0 || (p.barcode||'').indexOf(q) >= 0; });
  if (!prods.length) { list.innerHTML = '<div class="empty">Brak produktów</div>'; return; }
  var shown = prods.slice(0, 100);
  list.innerHTML = shown.map(function(p) {
    return '<div style="background:var(--surface);border-radius:var(--r);padding:10px 13px;box-shadow:var(--sh)">' +
      '<div style="font-size:13px;font-weight:700">' + escHtml(p.name) + '</div>' +
      '<div style="font-size:10px;color:var(--ink2);margin-top:2px">' + escHtml(p.group) + ' &middot; ' + p.weight + ' ' + p.unit + (p.barcode ? ' &middot; <strong>' + escHtml(p.barcode) + '</strong>' : ' &middot; <em>brak kodu</em>') + '</div>' +
      '</div>';
  }).join('') + (prods.length > 100 ? '<div style="text-align:center;padding:12px;font-size:12px;color:var(--ink2)">Pokazano 100 z ' + prods.length + '. Wpisz więcej liter aby zawęzić.</div>' : '');
}

// ═══ SETTINGS ═══
function renderSettings() {
  renderWorkerChips(); renderWhChips(); updateLocalInfo();
}
function updateLocalInfo() {
  var el = document.getElementById('localInfo'); if (!el) return;
  el.textContent = 'Wpisów w historii: ' + db.history.length;
}
function clearData() {
  if (!confirm('Usunąć WSZYSTKIE dane lokalne?')) return;
  localStorage.removeItem('mscan_v4');
  db = loadDB(); currentWh = null;
  renderWhChips(); updateHeaderSub(); updateLocalInfo();
  showToast('Dane wyczyszczone');
}

// ═══ CSV ═══
function exportCSV() {
  var items = db.history;
  if (filterWh !== 'all') items = items.filter(function(i) { return i.wh === filterWh; });
  if (filterOp !== 'all') items = items.filter(function(i) { return i.op === filterOp; });
  if (!items.length) { showToast('Brak danych'); return; }
  var hdr = 'Data;Czas;Kod kreskowy;Nazwa produktu;Grupa;Operacja;Ilość;Jednostka;Magazyn;Pracownik\n';
  var rows = items.map(function(i) {
    var d = new Date(i.ts);
    var sign = i.qty > 0 ? '+' : '';
    return [
      d.toLocaleDateString('pl-PL'),
      d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
      i.barcode ? '="' + i.barcode + '"' : '',
      i.name, i.group || '', i.op,
      sign + i.qty, i.unit || 'szt', i.wh, i.worker || ''
    ].map(function(v) { return '"' + String(v).replace(/"/g,'""') + '"'; }).join(';');
  }).join('\n');
  var blob = new Blob(['\uFEFF' + hdr + rows], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'magazyn_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url); showToast('Plik CSV gotowy');
}

// ═══ UTILS ═══
function fmtTime(ts) {
  var d = new Date(ts);
  if (d.toDateString() === new Date().toDateString()) return d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
var _t;
function showToast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(_t); _t = setTimeout(function() { t.classList.remove('show'); }, 2600);
}

// ═══ INIT ═══
initWorkerScreen();
renderWhChips();
updateHeaderSub();
renderGroupGrid();
</script>
