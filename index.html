<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A2F5C">
<title>MagazynScan</title>
<style>
  :root {
    --bg: #F4F2EE; --surface: #FFFFFF; --ink: #1A1A1A; --ink2: #666;
    --accent: #1A2F5C; --accent2: #E8B020; --border: #DDDAD3;
    --in-color: #1A2F5C; --out-color: #8B2F1A;
    --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --font: 'Trebuchet MS','Segoe UI',sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
  header { background: var(--accent); color: #fff; padding: 14px 16px 12px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
  .header-sub { font-size: 11px; opacity: 0.65; margin-top: 1px; }
  nav { display: grid; grid-template-columns: repeat(4,1fr); background: var(--surface); border-bottom: 2px solid var(--border); }
  nav button { padding: 9px 2px 7px; border: none; background: none; font-family: var(--font); font-size: 10px; font-weight: 600; color: var(--ink2); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; letter-spacing: 0.3px; }
  nav button svg { width: 19px; height: 19px; }
  nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); margin-bottom: -2px; }
  .screen { display: none; flex: 1; flex-direction: column; padding: 16px; gap: 14px; overflow-y: auto; padding-bottom: 40px; }
  .screen.active { display: flex; }
  .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--ink2); display: flex; align-items: center; gap: 6px; }
  .card-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .wh-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .wh-chip { padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border); font-size: 13px; font-weight: 600; font-family: var(--font); background: var(--bg); cursor: pointer; color: var(--ink); transition: all 0.15s; }
  .wh-chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  .wh-chip.add-wh { border-style: dashed; color: var(--ink2); font-size: 20px; padding: 2px 12px; }
  .scan-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .op-btn { padding: 12px; border-radius: var(--radius); border: 2px solid transparent; font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all 0.15s; }
  .op-btn.wejscie { background: #EEF2FA; color: var(--in-color); border-color: #C5D0E8; }
  .op-btn.wejscie.selected { background: var(--in-color); color: #fff; border-color: var(--in-color); }
  .op-btn.wyjscie { background: #FAF0EE; color: var(--out-color); border-color: #E8C5C0; }
  .op-btn.wyjscie.selected { background: var(--out-color); color: #fff; border-color: var(--out-color); }

  /* CAMERA */
  .camera-wrap { position: relative; background: #000; border-radius: var(--radius); overflow: hidden; aspect-ratio: 4/3; display: none; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 65%; aspect-ratio: 2/1; border: 2px solid var(--accent2); border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); position: relative; overflow: hidden; }
  .scan-line { position: absolute; left: 4px; right: 4px; height: 2px; background: var(--accent2); animation: scanline 2s linear infinite; top: 4px; }
  @keyframes scanline { 0%{top:4px;opacity:1}90%{top:calc(100% - 6px);opacity:1}100%{top:calc(100% - 6px);opacity:0} }
  .cam-hint { position: absolute; bottom: 10px; left: 0; right: 0; text-align: center; color: rgba(255,255,255,0.75); font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }

  .btn-main { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-main:active { opacity: 0.85; }
  .btn-stop { width: 100%; padding: 10px; background: var(--border); color: var(--ink2); border: none; border-radius: var(--radius); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; display: none; }
  .btn-capture { width: 100%; padding: 12px; background: none; color: var(--accent); border: 2px dashed var(--accent); border-radius: var(--radius); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #captureInput { display: none; }

  .input-row { display: flex; gap: 8px; }
  .text-input { flex: 1; padding: 10px 12px; border: 2px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; background: var(--bg); color: var(--ink); outline: none; transition: border-color 0.15s; }
  .text-input:focus { border-color: var(--accent); }
  .icon-btn { padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius); background: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--accent); }

  .result-flash { border-radius: var(--radius); padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; border-left: 4px solid var(--accent); animation: flashIn 0.3s ease; }
  .result-flash.wejscie { border-left-color: var(--in-color); background: #EEF2FA; }
  .result-flash.wyjscie { border-left-color: var(--out-color); background: #FAF0EE; }
  @keyframes flashIn { from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)} }
  .result-code { font-size: 11px; color: var(--ink2); font-weight: 600; letter-spacing: 0.5px; }
  .result-name { font-size: 17px; font-weight: 700; }
  .result-meta { font-size: 12px; color: var(--ink2); }
  .result-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-top: 2px; width: fit-content; }
  .result-badge.wejscie { background: var(--in-color); color: #fff; }
  .result-badge.wyjscie { background: var(--out-color); color: #fff; }

  .sync-row { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #ccc; }
  .sync-dot.ok { background: #2D6A3F; animation: pulse 1.8s ease infinite; }
  .sync-dot.warn { background: var(--accent2); }
  .sync-dot.off { background: #ccc; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }

  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; animation: slideUp 0.25s ease; max-height: 90vh; overflow-y: auto; }
  @keyframes slideUp { from{transform:translateY(100%)}to{transform:translateY(0)} }
  .modal h2 { font-size: 16px; font-weight: 700; }
  .modal label { font-size: 11px; font-weight: 700; color: var(--ink2); letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .modal-code-display { font-size: 13px; padding: 8px 12px; background: var(--bg); border-radius: 8px; font-weight: 600; color: var(--ink2); letter-spacing: 1px; border: 1px solid var(--border); }
  .btn-primary { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-secondary { width: 100%; padding: 12px; background: none; color: var(--ink2); border: 2px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; }
  .qty-row { display: flex; align-items: center; gap: 12px; }
  .qty-row label { flex: 0 0 auto; }
  .qty-input { width: 80px; padding: 8px 10px; border: 2px solid var(--border); border-radius: var(--radius); font-family: var(--font); font-size: 16px; font-weight: 700; text-align: center; background: var(--bg); color: var(--ink); outline: none; }
  .qty-input:focus { border-color: var(--accent); }

  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-chip { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 12px; font-weight: 600; font-family: var(--font); background: var(--bg); cursor: pointer; color: var(--ink2); transition: all 0.15s; }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-chip.win.active { background: var(--in-color); border-color: var(--in-color); }
  .filter-chip.wout.active { background: var(--out-color); border-color: var(--out-color); }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item { background: var(--surface); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); border-left: 3px solid var(--border); }
  .history-item.wejscie { border-left-color: var(--in-color); }
  .history-item.wyjscie { border-left-color: var(--out-color); }
  .hi-icon { width: 32px; height: 32px; flex-shrink: 0; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .hi-icon.wejscie { background: #EEF2FA; }
  .hi-icon.wyjscie { background: #FAF0EE; }
  .hi-info { flex: 1; min-width: 0; }
  .hi-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hi-code { font-size: 11px; color: var(--ink2); margin-top: 1px; }
  .hi-meta { text-align: right; flex-shrink: 0; }
  .hi-time { font-size: 11px; font-weight: 700; color: var(--ink2); }
  .hi-wh { font-size: 10px; color: var(--ink2); margin-top: 1px; }
  .product-item { background: var(--surface); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); }
  .product-icon { width: 36px; height: 36px; background: #EEF2FA; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 700; }
  .product-code { font-size: 11px; color: var(--ink2); margin-top: 1px; letter-spacing: 0.5px; }
  .product-count { font-size: 11px; color: var(--ink2); margin-top: 2px; }
  .delete-btn { padding: 6px 8px; border: none; background: none; cursor: pointer; color: #ccc; border-radius: 6px; }
  .delete-btn:active { color: var(--out-color); }
  .btn-action { width: 100%; padding: 13px; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-action.amber { background: var(--accent2); color: #1A1A1A; }
  .btn-action.outline { background: none; color: var(--accent); border: 2px solid var(--accent); }
  .btn-action.primary { background: var(--accent); color: #fff; }
  .btn-action.danger { background: none; color: var(--out-color); border: 2px solid var(--out-color); }
  .setting-hint { font-size: 11px; color: var(--ink2); line-height: 1.6; }
  .setting-row label { font-size: 11px; font-weight: 700; color: var(--ink2); letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .divider { border: none; border-top: 1px solid var(--border); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink2); font-size: 14px; line-height: 2; }
  .empty-state svg { width: 44px; height: 44px; opacity: 0.25; display: block; margin: 0 auto 8px; }
  #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1A1A1A; color: #fff; padding: 10px 22px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 300; transition: transform 0.28s ease, opacity 0.28s ease; opacity: 0; white-space: nowrap; pointer-events: none; max-width: 92vw; overflow: hidden; text-overflow: ellipsis; }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<header>
  <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
    <rect x="2" y="9" width="4" height="17" fill="white" opacity="0.9"/>
    <rect x="8" y="5" width="2" height="21" fill="white" opacity="0.9"/>
    <rect x="12" y="9" width="3" height="17" fill="white" opacity="0.9"/>
    <rect x="17" y="5" width="2" height="21" fill="white" opacity="0.9"/>
    <rect x="21" y="9" width="4" height="17" fill="white" opacity="0.9"/>
    <rect x="27" y="5" width="3" height="21" fill="white" opacity="0.9"/>
  </svg>
  <div>
    <h1>MagazynScan</h1>
    <div class="header-sub" id="headerSub">Wybierz magazyn</div>
  </div>
</header>

<nav>
  <button class="active" onclick="showScreen('scan')" id="tab-scan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
    SKANUJ
  </button>
  <button onclick="showScreen('history')" id="tab-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
    HISTORIA
  </button>
  <button onclick="showScreen('products')" id="tab-products">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    PRODUKTY
  </button>
  <button onclick="showScreen('settings')" id="tab-settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    USTAWIENIA
  </button>
</nav>

<!-- SKANUJ -->
<div class="screen active" id="screen-scan">
  <div class="card">
    <div class="card-header"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> MAGAZYN</div>
    <div class="card-body"><div class="wh-row" id="whChips"></div></div>
  </div>
  <div class="card">
    <div class="card-header"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg> OPERACJA</div>
    <div class="card-body">
      <div class="scan-toggle">
        <button class="op-btn wejscie selected" id="btnWejscie" onclick="setOp('wejscie')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg> WEJŚCIE
        </button>
        <button class="op-btn wyjscie" id="btnWyjscie" onclick="setOp('wyjscie')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> WYJŚCIE
        </button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg> SKANER</div>
    <div class="card-body">
      <div class="camera-wrap" id="cameraWrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-overlay"><div class="scan-frame"><div class="scan-line"></div></div></div>
        <div class="cam-hint">Skieruj na kod kreskowy</div>
      </div>
      <button class="btn-main" id="camStartBtn" onclick="startCamera()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Uruchom kamerę
      </button>
      <button class="btn-stop" id="camStopBtn" onclick="stopCamera()">Zatrzymaj kamerę</button>
      <button class="btn-capture" onclick="document.getElementById('captureInput').click()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="5"/></svg>
        Zrób zdjęcie i dekoduj (backup)
      </button>
      <input type="file" id="captureInput" accept="image/*" capture="environment" onchange="handleCapture(event)">
    </div>
  </div>
  <div class="card">
    <div class="card-header"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> WPISZ KOD RĘCZNIE</div>
    <div class="card-body">
      <div class="input-row">
        <input class="text-input" id="manualInput" placeholder="np. 5901234123457" type="text" inputmode="numeric" onkeydown="if(event.key==='Enter')handleManualScan()">
        <button class="icon-btn" onclick="handleManualScan()">OK</button>
      </div>
    </div>
  </div>
  <div id="scanResult" style="display:none;"></div>
  <div class="card" id="syncStatusCard" style="display:none;">
    <div class="card-body"><div class="sync-row"><div class="sync-dot off" id="syncDot"></div><span id="syncStatusText">Sheets: nie skonfigurowano</span></div></div>
  </div>
</div>

<!-- HISTORIA -->
<div class="screen" id="screen-history">
  <div class="card">
    <div class="card-header"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> FILTRUJ</div>
    <div class="card-body">
      <div class="filter-row" id="whFilterChips"></div>
      <div class="filter-row">
        <button class="filter-chip active" id="fAll" onclick="setOpFilter('all')">Wszystkie</button>
        <button class="filter-chip win" id="fWejscie" onclick="setOpFilter('wejscie')">Wejście</button>
        <button class="filter-chip wout" id="fWyjscie" onclick="setOpFilter('wyjscie')">Wyjście</button>
      </div>
    </div>
  </div>
  <button class="btn-action amber" onclick="sendCsvByEmail()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    Wyślij CSV mailem
  </button>
  <button class="btn-action outline" onclick="exportCSV()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Pobierz CSV

<div class="screen" id="screen-settings">
  <div class="card">
    <div class="card-header"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 8.63 19.79 19.79 0 01.01 2 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14z"/></svg> ADRES E-MAIL DO RAPORTÓW</div>

    <div class="card-body">

<div class="modal-backdrop" id="newProductModal">
  <div class="modal">
    <h2>Nowy produkt — nadaj nazwę</h2>
    <div><label>Kod kreskowy</label><div class="modal-code-display" id="modalCodeDisplay">—</div></div>
    <div><label>Nazwa produktu</label><input class="text-input" id="newProductName" placeholder="np. Śruby M8 × 20mm" style="width:100%;" oninput="updateRegisterBtn()"></div>
    <div class="qty-row"><label>Ilość</label><input class="qty-input" id="newProductQty" type="number" min="1" value="1"></div>
    <button class="btn-primary" id="registerBtn" onclick="registerProduct()" style="opacity:0.5;" disabled>Zarejestruj operację</button>

<div class="modal-backdrop" id="knownProductModal">
  <div class="modal">
    <h2 id="knownProductTitle">—</h2>
    <div><label>Kod</label><div class="modal-code-display" id="knownCodeDisplay">—</div></div>
    <div><label>Magazyn</label><div class="modal-code-display" id="knownWhDisplay">—</div></div>

    <button class="btn-primary" id="knownConfirmBtn" onclick="confirmKnown()">Potwierdź</button>
    <button class="btn-secondary" onclick="closeKnownModal()">Anuluj</button>
  </div>
</div>

<!-- MODAL: DODAJ MAGAZYN -->
<div class="modal-backdrop" id="addWhModal">
  <div class="modal">
    <h2>Nowy magazyn</h2>
    <div><label>Nazwa</label><input class="text-input" id="newWhName" placeholder="np. Magazyn B" style="width:100%;" onkeydown="if(event.key==='Enter')addWarehouse()"></div>
    <button class="btn-primary" onclick="addWarehouse()">Dodaj</button>
    <button class="btn-secondary" onclick="closeWhModal()">Anuluj</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let db = loadDB();
let currentOp = 'wejscie';
let currentWh = db.warehouses[0] || null;
let filterWh = 'all', filterOp = 'all';
let pendingCode = null;
let cameraActive = false;
let scanLoop = null;
let detector = null;

function loadDB() {
  try { const r = localStorage.getItem('mscan_v3'); if (r) return JSON.parse(r); } catch(e) {}
  return { warehouses: ['Magazyn A'], products: {}, history: [], pending: [], email: '', webhookUrl: '' };
}
function saveDB() { localStorage.setItem('mscan_v3', JSON.stringify(db)); updateSyncUI(); updateLocalDataInfo(); }

// ════════════════════════════════════════
// SCREENS
// ════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name !== 'scan') stopCamera();
  if (name === 'history') { renderWhFilterChips(); renderHistory(); }
  if (name === 'products') renderProducts();
  if (name === 'settings') renderSettings();
}

// ════════════════════════════════════════
// WAREHOUSES
// ════════════════════════════════════════
function renderWhChips() {
  ['whChips','whChipsSettings'].forEach(id => {
    const c = document.getElementById(id); if (!c) return;
    c.innerHTML = '';
    db.warehouses.forEach(wh => {
      const b = document.createElement('button');
      b.className = 'wh-chip' + (wh === currentWh ? ' selected' : '');
      b.textContent = wh;
      b.onclick = () => { currentWh = wh; renderWhChips(); updateHeaderSub(); };
      c.appendChild(b);
    });
    const add = document.createElement('button');
    add.className = 'wh-chip add-wh'; add.textContent = '+';
    add.onclick = () => { document.getElementById('newWhName').value = ''; document.getElementById('addWhModal').classList.add('open'); };
    c.appendChild(add);
  });
}
function renderWhFilterChips() {
  const fc = document.getElementById('whFilterChips'); fc.innerHTML = '';
  [['all','Wszystkie'], ...db.warehouses.map(w=>[w,w])].forEach(([val,label]) => {
    const b = document.createElement('button');
    b.className = 'filter-chip' + (filterWh === val ? ' active' : '');
    b.textContent = label;
    b.onclick = () => { filterWh = val; renderWhFilterChips(); renderHistory(); };
    fc.appendChild(b);
  });
}
function addWarehouse() {
  const v = document.getElementById('newWhName').value.trim(); if (!v) return;
  if (!db.warehouses.includes(v)) { db.warehouses.push(v); saveDB(); }
  currentWh = v; closeWhModal(); renderWhChips(); updateHeaderSub(); showToast('Dodano: ' + v);
}
function closeWhModal() { document.getElementById('addWhModal').classList.remove('open'); }
function updateHeaderSub() { document.getElementById('headerSub').textContent = currentWh || 'Wybierz magazyn'; }

// ════════════════════════════════════════
// OPERATION
// ════════════════════════════════════════
function setOp(op) {
  currentOp = op;
  document.getElementById('btnWejscie').classList.toggle('selected', op === 'wejscie');
  document.getElementById('btnWyjscie').classList.toggle('selected', op === 'wyjscie');
}
function setOpFilter(op) {
  filterOp = op;
  ['all','wejscie','wyjscie'].forEach(x => {
    const id = x === 'all' ? 'fAll' : x === 'wejscie' ? 'fWejscie' : 'fWyjscie';
    document.getElementById(id).classList.toggle('active', x === op);
  });
  renderHistory();
}

// ════════════════════════════════════════
// BARCODE DETECTOR — native, no library
// ════════════════════════════════════════
async function getDetector() {
  if (detector) return detector;
  if (!('BarcodeDetector' in window)) return null;
  try {
    const formats = await BarcodeDetector.getSupportedFormats();
    detector = new BarcodeDetector({ formats });
    return detector;
  } catch(e) { return null; }
}

async function startCamera() {
  if (cameraActive) return;
  if (!currentWh) { showToast('Najpierw wybierz magazyn!'); return; }

  const det = await getDetector();
  if (!det) {
    showToast('Ten telefon/przeglądarka nie obsługuje BarcodeDetector. Użyj trybu zdjęcia.');
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    document.getElementById('cameraWrap').style.display = 'block';
    document.getElementById('camStartBtn').style.display = 'none';
    document.getElementById('camStopBtn').style.display = 'block';
    cameraActive = true;

    // scan loop — runs every 300ms
    scanLoop = setInterval(async () => {
      if (!cameraActive) return;
      try {
        const results = await det.detect(video);
        if (results && results.length > 0) {
          const code = results[0].rawValue;
          if (code) {
            if (navigator.vibrate) navigator.vibrate(80);
            stopCamera();
            handleCode(code);
          }
        }
      } catch(e) { /* ignore frame errors */ }
    }, 300);

  } catch(e) {
    cameraActive = false;
    document.getElementById('cameraWrap').style.display = 'none';
    document.getElementById('camStartBtn').style.display = 'flex';
    document.getElementById('camStopBtn').style.display = 'none';
    if (e.name === 'NotAllowedError') showToast('Brak zgody na kamerę — zezwól w ustawieniach Chrome');
    else if (e.name === 'NotFoundError') showToast('Nie znaleziono kamery');
    else showToast('Błąd kamery: ' + (e.message || e.name));
  }
}

function stopCamera() {
  cameraActive = false;
  if (scanLoop) { clearInterval(scanLoop); scanLoop = null; }
  const v = document.getElementById('video');
  if (v.srcObject) { v.srcObject.getTracks().forEach(t => t.stop()); v.srcObject = null; }
  document.getElementById('cameraWrap').style.display = 'none';
  document.getElementById('camStartBtn').style.display = 'flex';
  document.getElementById('camStopBtn').style.display = 'none';
}

// ════════════════════════════════════════
// CAPTURE FALLBACK — zdjęcie → BarcodeDetector
// ════════════════════════════════════════
async function handleCapture(event) {
  const file = event.target.files[0]; event.target.value = '';
  if (!file) return;
  if (!currentWh) { showToast('Najpierw wybierz magazyn!'); return; }

  showToast('Dekodowanie zdjęcia...');

  const det = await getDetector();
  if (!det) { showToast('BarcodeDetector niedostępny na tym urządzeniu'); return; }

  try {
    const bmp = await createImageBitmap(file);
    const results = await det.detect(bmp);
    if (results && results.length > 0) {
      if (navigator.vibrate) navigator.vibrate(80);
      handleCode(results[0].rawValue);
    } else {
      showToast('Nie znaleziono kodu — spróbuj bliżej lub z lepszym oświetleniem');
    }
  } catch(e) {
    showToast('Błąd dekodowania: ' + (e.message || e));
  }
}

// ════════════════════════════════════════
// MANUAL
// ════════════════════════════════════════
function handleManualScan() {
  const v = document.getElementById('manualInput').value.trim(); if (!v) return;
  if (!currentWh) { showToast('Najpierw wybierz magazyn!'); return; }
  document.getElementById('manualInput').value = '';
  handleCode(v);
}

// ════════════════════════════════════════
// HANDLE CODE
// ════════════════════════════════════════
function handleCode(code) {
  pendingCode = code;
  if (db.products[code]) {
    const p = db.products[code];
    document.getElementById('knownProductTitle').textContent = p.name;
    document.getElementById('knownCodeDisplay').textContent = code;
    document.getElementById('knownWhDisplay').textContent = currentWh;
    document.getElementById('knownProductQty').value = 1;
    const btn = document.getElementById('knownConfirmBtn');
    btn.textContent = 'Potwierdź ' + (currentOp === 'wejscie' ? 'WEJŚCIE' : 'WYJŚCIE');
    btn.style.background = currentOp === 'wejscie' ? 'var(--in-color)' : 'var(--out-color)';
    document.getElementById('knownProductModal').classList.add('open');
  } else {
    document.getElementById('modalCodeDisplay').textContent = code;
    document.getElementById('newProductName').value = '';
    document.getElementById('newProductQty').value = 1;
    updateRegisterBtn();
    document.getElementById('newProductModal').classList.add('open');
    setTimeout(() => document.getElementById('newProductName').focus(), 350);
  }
}
function updateRegisterBtn() {
  const ok = document.getElementById('newProductName').value.trim().length > 0;
  const btn = document.getElementById('registerBtn');
  btn.disabled = !ok; btn.style.opacity = ok ? '1' : '0.5';
}
function registerProduct() {
  const name = document.getElementById('newProductName').value.trim();
  const qty = parseInt(document.getElementById('newProductQty').value) || 1;
  if (!name) return;
  db.products[pendingCode] = { name, firstSeen: Date.now() };
  addHistory(pendingCode, name, qty);
  closeModal();
}
function confirmKnown() {
  const qty = parseInt(document.getElementById('knownProductQty').value) || 1;
  addHistory(pendingCode, db.products[pendingCode].name, qty);
  closeKnownModal();
}
function addHistory(code, name, qty) {
  const entry = { id: Date.now()+'_'+Math.random().toString(36).slice(2), code, name, op: currentOp, wh: currentWh, qty, ts: Date.now(), synced: false };
  db.history.unshift(entry);
  db.pending.push(entry.id);
  saveDB();
  showResultFlash(entry);
  showToast(currentOp === 'wejscie' ? 'Zarejestrowano WEJŚCIE' : 'Zarejestrowano WYJŚCIE');
  syncEntry(entry);
}
function showResultFlash(e) {
  const r = document.getElementById('scanResult'); r.style.display = 'block';
  r.innerHTML = `<div class="result-flash ${e.op}">
    <div class="result-code">${escHtml(e.code)}</div>
    <div class="result-name">${escHtml(e.name)}</div>
    <div class="result-meta">${escHtml(e.wh)} &middot; ${e.qty} szt. &middot; ${fmtTime(e.ts)}</div>
    <span class="result-badge ${e.op}">${e.op==='wejscie'?'WEJŚCIE':'WYJŚCIE'}</span>
  </div>`;
}
function closeModal() { document.getElementById('newProductModal').classList.remove('open'); pendingCode = null; }
function closeKnownModal() { document.getElementById('knownProductModal').classList.remove('open'); pendingCode = null; }

// ════════════════════════════════════════
// GOOGLE SHEETS SYNC
// ════════════════════════════════════════
async function syncEntry(entry) {
  if (!db.webhookUrl) return;
  try {
    await fetch(db.webhookUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'addRow', data: {
        id:entry.id, date:new Date(entry.ts).toLocaleDateString('pl-PL'),
        time:new Date(entry.ts).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
        code:entry.code, name:entry.name, op:entry.op, wh:entry.wh, qty:entry.qty
      }})
    });
    markSynced(entry.id); saveDB();
  } catch(e) {}
  updateSyncUI();
}
async function syncPending() {
  if (!db.webhookUrl) { showToast('Najpierw zapisz URL webhook'); return; }
  if (!db.pending.length) { showToast('Brak oczekujących wpisów'); return; }
  showToast('Wysyłanie ' + db.pending.length + ' wpisów...');
  const ids = [...db.pending]; let sent = 0;
  for (const id of ids) {
    const entry = db.history.find(h => h.id === id);
    if (!entry) { markSynced(id); continue; }
    try {
      await fetch(db.webhookUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ action:'addRow', data: {
          id:entry.id, date:new Date(entry.ts).toLocaleDateString('pl-PL'),
          time:new Date(entry.ts).toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
          code:entry.code, name:entry.name, op:entry.op, wh:entry.wh, qty:entry.qty
        }})
      });
      markSynced(id); sent++;
    } catch(e) {}
  }
  saveDB(); showToast('Wysłano ' + sent + ' z ' + ids.length + ' wpisów'); updateSyncUI();
}
function markSynced(id) {
  const e = db.history.find(h => h.id === id); if (e) e.synced = true;
  db.pending = db.pending.filter(p => p !== id);
}
function updateSyncUI() {
  const p = db.pending.length, hw = !!db.webhookUrl;
  const dotClass = !hw ? 'off' : p === 0 ? 'ok' : 'warn';
  const text = !hw ? 'Sheets: nie skonfigurowano' : p === 0 ? 'Sheets: zsynchronizowano' : 'Sheets: ' + p + ' wpisów oczekuje';
  ['syncDot','settingsSyncDot'].forEach(id => { const el=document.getElementById(id); if(el) el.className='sync-dot '+dotClass; });
  ['syncStatusText','settingsSyncText'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=text; });
  const card = document.getElementById('syncStatusCard'); if (card) card.style.display = hw ? 'block' : 'none';
  const pi = document.getElementById('pendingInfo');
  if (pi) pi.textContent = p > 0 ? p + ' wpisów nie wysłanych. Kliknij "Wyślij oczekujące wpisy" gdy masz internet.' : 'Wszystkie wpisy zsynchronizowane.';
}

// ════════════════════════════════════════
// HISTORY
// ════════════════════════════════════════
function renderHistory() {
  const list = document.getElementById('historyList');
  let items = db.history;
  if (filterWh !== 'all') items = items.filter(i => i.wh === filterWh);
  if (filterOp !== 'all') items = items.filter(i => i.op === filterOp);
  if (!items.length) { list.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M9 9h.01M15 9h.01M9 15s1 1.5 3 1.5 3-1.5 3-1.5"/></svg>Brak wpisów</div>`; return; }
  list.innerHTML = items.map(i => `
    <div class="history-item ${i.op}">
      <div class="hi-icon ${i.op}">${i.op==='wejscie'
        ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>'
        : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>'}</div>
      <div class="hi-info">
        <div class="hi-name">${escHtml(i.name)}</div>
        <div class="hi-code">${escHtml(i.code)} &middot; ${i.qty} szt.</div>
      </div>
      <div class="hi-meta">
        <div class="hi-time">${fmtTime(i.ts)}</div>
        <div class="hi-wh">${escHtml(i.wh)}${i.synced?'':' <span style="color:var(--accent2);font-size:9px;font-weight:800;">LOK</span>'}</div>
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════
// PRODUCTS
// ════════════════════════════════════════
function renderProducts() {
  const q = (document.getElementById('productSearch')?.value||'').toLowerCase();
  const list = document.getElementById('productList');
  const entries = Object.entries(db.products).filter(([c,p]) => !q||c.includes(q)||p.name.toLowerCase().includes(q));
  if (!entries.length) { list.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Brak produktów</div>`; return; }
  list.innerHTML = entries.map(([code,p]) => {
    const cnt = db.history.filter(h=>h.code===code).length;
    const sc = code.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="product-item">
      <div class="product-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      <div class="product-info"><div class="product-name">${escHtml(p.name)}</div><div class="product-code">${escHtml(code)}</div><div class="product-count">${cnt} operacji</div></div>
      <button class="delete-btn" onclick="deleteProduct('${sc}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg></button>
    </div>`;
  }).join('');
}
function deleteProduct(code) {
  if (!confirm('Usunąć "' + (db.products[code]?.name||code) + '"?')) return;
  delete db.products[code]; saveDB(); renderProducts(); showToast('Usunięto');
}

// ════════════════════════════════════════
// SETTINGS
// ════════════════════════════════════════
function renderSettings() {
  document.getElementById('emailInput').value = db.email||'';
  document.getElementById('webhookInput').value = db.webhookUrl||'';
  renderWhChips(); updateSyncUI(); updateLocalDataInfo();
}
function saveEmail() { db.email = document.getElementById('emailInput').value.trim(); saveDB(); showToast('Adres e-mail zapisany'); }
function saveWebhook() {
  db.webhookUrl = document.getElementById('webhookInput').value.trim(); saveDB();
  showToast(db.webhookUrl ? 'Webhook zapisany' : 'Webhook usunięty');
  updateSyncUI(); if (db.webhookUrl && db.pending.length) syncPending();
}
function updateLocalDataInfo() {
  const el = document.getElementById('localDataInfo'); if (!el) return;
  el.textContent = `Wpisów: ${db.history.length} | Produktów: ${Object.keys(db.products).length} | Oczekujących: ${db.pending.length}`;
}
function clearAllData() {
  if (!confirm('Usunąć WSZYSTKIE dane lokalne? Tej operacji nie można cofnąć.')) return;
  localStorage.removeItem('mscan_v3');
  db = loadDB(); currentWh = null;
  renderWhChips(); updateHeaderSub(); updateSyncUI(); updateLocalDataInfo();
  showToast('Dane lokalne wyczyszczone');
}

// ════════════════════════════════════════
// CSV + EMAIL
// ════════════════════════════════════════
function filteredItems() {
  let items = db.history;
  if (filterWh !== 'all') items = items.filter(i=>i.wh===filterWh);
  if (filterOp !== 'all') items = items.filter(i=>i.op===filterOp);
  return items;
}
function exportCSV() {
  const items = filteredItems(); if (!items.length) { showToast('Brak danych'); return; }
  const hdr = 'Data;Czas;Kod;Nazwa;Operacja;Magazyn;Ilość\n';
  const rows = items.map(i => {
    const d = new Date(i.ts);
    return [d.toLocaleDateString('pl-PL'), d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}), i.code, i.name, i.op, i.wh, i.qty]
      .map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(';');
  }).join('\n');
  const blob = new Blob(['\uFEFF'+hdr+rows],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='magazyn_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(url); showToast('Plik CSV gotowy');
}
function sendCsvByEmail() {
  const items = filteredItems(); if (!items.length) { showToast('Brak danych'); return; }
  const date = new Date().toLocaleDateString('pl-PL');
  const subject = encodeURIComponent('Raport magazynowy ' + date);
  const lines = ['Raport MagazynScan — '+date,'','Operacji: '+items.length,
    'Wejść: '+items.filter(i=>i.op==='wejscie').length,'Wyjść: '+items.filter(i=>i.op==='wyjscie').length,'',
    'Ostatnie 10:',
    ...items.slice(0,10).map(i=>{const d=new Date(i.ts);return d.toLocaleDateString('pl-PL')+' '+d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'})+' | '+(i.op==='wejscie'?'WEJ':'WYJ')+' | '+i.name+' ('+i.qty+' szt.) | '+i.wh;}),
    '','Pełny CSV — pobierz przyciskiem "Pobierz CSV" i dołącz jako załącznik.'
  ];
  exportCSV();
  window.location.href = 'mailto:' + (db.email||'') + '?subject=' + subject + '&body=' + encodeURIComponent(lines.join('\n'));
  showToast('Otwieranie klienta pocztowego...');
}

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function fmtTime(ts) {
  const d = new Date(ts);
  if (d.toDateString()===new Date().toDateString()) return d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
let _t;
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_t); _t=setTimeout(()=>t.classList.remove('show'),2600);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
renderWhChips();
updateHeaderSub();
updateSyncUI();
</script>
